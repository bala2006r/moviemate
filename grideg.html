<!DOCTYPE html>
<head>
    <title>grid example</title>
    <style>
        .container
        {    width:100%;
             height:100vh;            
            display:grid;
            grid-template-rows: repeat(2,3fr);

            grid-template-columns: repeat(4,2fr);
            gap:2rem;
        }
        .main
        { 
            background-color: aqua;
            
            grid-column-start:2;
            grid-column-end:-1;

              
        }
        .side
        {
            background-color: darkblue;
            grid-row:span 2;
            
        }
        .up
        {
            background-color: black;

            

        }
        
    </style>
</head>
<html>
    <div class="container">
        <div class="side"></div>
    <div class="main"></div>
    
    <div class="up">
        <img 
    </div>
    <div class="up"></div>
    <div class="up"></div>
    </div>
</html>
