<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Login Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to right, rgb(162, 216, 162), rgb(102, 194, 102));
        }

        .form-container {
            width: 100%;
            max-width: 380px;
            padding: 30px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.15);
        }

        .btn-bms {
            background-color: rgb(60, 60, 60);
            color: white;
            border: none;
            transition: 0.3s;
            font-weight: 600;
        }
        .btn-bms:hover {
            background-color: rgb(40, 40, 40);
            color: white;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <form>
            <h1 class="h3 mb-3 text-center"> Sign In</h1>

            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                <label for="floatingInput">Email </label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                <label for="floatingPassword">Password</label>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" value="remember-me" id="flexCheckDefault">
                <label class="form-check-label" for="flexCheckDefault"> Remember me </label>
            </div>

            <button class="btn btn-bms w-100 py-2" type="submit">Sign in</button>
            <p class="mt-3 text-center text-muted">© 2025</p>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
